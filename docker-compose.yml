version: '3.8'

services:
  # --- Infraestrutura ---
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dijkfood
    ports:
      - "5432:5432"
    volumes:
      - ./database/DDL.sql:/docker-entrypoint-initdb.d/DDL.sql

  dynamodb-local:
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    image: "amazon/dynamodb-local:latest"
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    volumes:
      - "./docker/dynamodb:/home/dynamodblocal/data"
    working_dir: /home/dynamodblocal

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: "http://dynamodb-local:8000"
    depends_on:
      - dynamodb-local

  # --- Serviços ---
  database-service:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: database-service
    ports:
      - "8002:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: dijkfood
      DB_USER: postgres
      DB_PASS: postgres
      SCHEMA: dijkfood_schema
    depends_on:
      - postgres

  route-service:
    build:
      context: .
      dockerfile: route_service/Dockerfile
    container_name: route-service
    ports:
      - "8003:8001"
    environment:
      PYTHONUNBUFFERED: 1

  order-service:
    build:
      context: .
      dockerfile: order_service/Dockerfile
    container_name: order-service
    ports:
      - "8004:8000"
    environment:
      AWS_REGION: us-east-1
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      DYNAMODB_TABLE_NAME: DijkfoodOrders
    depends_on:
      - dynamodb-local
