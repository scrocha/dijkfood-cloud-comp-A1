services:
  # --- Infraestrutura ---
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dijkfood
    ports:
      - "5432:5432"
    volumes:
      - ./database/DDL.sql:/docker-entrypoint-initdb.d/DDL.sql

  dynamodb-local:
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    image: "amazon/dynamodb-local:latest"
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    volumes:
      - "./docker/dynamodb:/home/dynamodblocal/data"
    working_dir: /home/dynamodblocal

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: "http://dynamodb-local:8000"
    depends_on:
      - dynamodb-local

  # --- Serviços ---
  database-service:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: database-service
    ports:
      - "8002:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: dijkfood
      DB_USER: postgres
      DB_PASS: postgres
      SCHEMA: dijkfood_schema
    depends_on:
      - postgres

  route-service:
    build:
      context: .
      dockerfile: route_service/Dockerfile
    container_name: route-service
    ports:
      - "8003:8001"
    environment:
      PYTHONUNBUFFERED: 1

  order-service:
    build:
      context: .
      dockerfile: dynamo/Dockerfile
    container_name: order-service
    ports:
      - "8004:8002"
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      DYNAMODB_TABLE_NAME: DijkfoodOrders
      DYNAMODB_AUTO_CREATE: "1"
    depends_on:
      - dynamodb-local

  general-api:
    build:
      context: .
      dockerfile: general_api/Dockerfile
    container_name: general-api
    ports:
      - "8005:8000"
    command: ["uvicorn", "general_api.api:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    environment:
      DATABASE_SERVICE_URL: http://database-service:8000
      ORDER_SERVICE_URL: http://order-service:8002
      ROUTE_SERVICE_URL: http://route-service:8001
      # Obrigatórios para /checkout (simuladores ainda não existem):
      # SIM_RESTAURANT_URL: http://sim-restaurant:8000
      # SIM_COURIER_URL: http://sim-courier:8000
      TIMEOUT_DB_S: 5
      TIMEOUT_ORDER_S: 5
      TIMEOUT_ROUTE_S: 30
      TIMEOUT_SIM_S: 5
      ARRIVAL_THRESHOLD_M: 10
      SIM_RESTAURANT_URL: http://sim-restaurant:8006
      SIM_COURIER_URL: http://sim-courier:8007
    depends_on:
      - database-service
      - route-service
      - order-service

  sim-restaurant:
    build:
      context: .
      dockerfile: simulador_restaurante/Dockerfile
    container_name: sim-restaurant
    ports:
      - "8006:8006"
    environment:
      GENERAL_API_URL: http://general-api:8000
    depends_on:
      - general-api

  sim-courier:
    build:
      context: .
      dockerfile: simulador_entregadores/Dockerfile
    container_name: sim-courier
    ports:
      - "8007:8007"
    environment:
      GENERAL_API_URL: http://general-api:8000
    depends_on:
      - general-api

  sim-pedidos:
    build:
      context: .
      dockerfile: simulador_pedidos/Dockerfile
    container_name: sim-pedidos
    ports:
      - "8008:8005"
    environment:
      GENERAL_API_URL: http://general-api:8000
    depends_on:
      - general-api
